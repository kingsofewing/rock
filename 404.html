<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:    #3d4f58;
    --cream: #e8dfc0;
    --teal:  #4fb3a8;
    --coral: #c8623a;
    --brown: #1e0e08;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--brown);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  img.logo { height: 90px; margin-bottom: 2rem; opacity: 0.9; }
  .code {
    font-family: 'Pacifico', cursive;
    font-size: clamp(5rem, 20vw, 10rem);
    color: var(--coral);
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  h1 {
    font-family: 'Pacifico', cursive;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--cream);
    margin-bottom: 1rem;
  }
  p {
    font-size: 1rem;
    color: rgba(232,223,192,0.6);
    font-weight: 300;
    max-width: 380px;
    line-height: 1.75;
    margin-bottom: 2rem;
  }
  .divider { width: 40px; height: 2px; background: var(--teal); margin: 1rem auto 1.5rem; }
  .btn {
    display: inline-block;
    padding: 0.75rem 2rem;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none;
    background: var(--coral);
    color: var(--brown);
    border: 2px solid var(--coral);
    transition: all 0.22s;
  }
  .btn:hover { background: var(--cream); border-color: var(--cream); }
</style>
