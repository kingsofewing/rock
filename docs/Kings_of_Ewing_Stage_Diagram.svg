<svg xmlns="http://www.w3.org/2000/svg" width="1020" height="680" viewBox="0 0 1020 680" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="1020" height="680" fill="#1e1e1e"/>

  <!-- Title -->
  <text x="510" y="36" text-anchor="middle" font-size="19" font-weight="bold" fill="#e8dfc0" letter-spacing="3">KINGS OF EWING — STAGE DIAGRAM</text>
  <line x1="60" y1="46" x2="960" y2="46" stroke="#4fb3a8" stroke-width="1.5"/>

  <!-- Stage box -->
  <rect x="100" y="58" width="820" height="540" rx="6" fill="#252525" stroke="#4fb3a8" stroke-width="2"/>

  <!-- BACK label -->
  <rect x="100" y="58" width="820" height="28" fill="#1a1a1a" rx="6"/>
  <text x="510" y="77" text-anchor="middle" font-size="11" fill="rgba(232,223,192,0.4)" letter-spacing="6">BACK</text>

  <!-- AUDIENCE label -->
  <text x="510" y="665" text-anchor="middle" font-size="11" fill="rgba(232,223,192,0.4)" letter-spacing="6">AUDIENCE</text>

  <!-- STAGE RIGHT — left side -->
  <text transform="rotate(-90) translate(-340, 30)" font-size="11" fill="rgba(232,223,192,0.4)" letter-spacing="6" text-anchor="middle">STAGE RIGHT</text>

  <!-- STAGE LEFT — right side -->
  <text transform="rotate(90) translate(340, -990)" font-size="11" fill="rgba(232,223,192,0.4)" letter-spacing="6" text-anchor="middle">STAGE LEFT</text>

  <!-- ── AMPS (back row) ── -->
  <rect x="120" y="155" width="65" height="36" rx="3" fill="#2e2e2e" stroke="#c8623a" stroke-width="1.5"/>
  <text x="152" y="170" text-anchor="middle" font-size="9" fill="#c8623a" font-weight="bold">AMP</text>
  <text x="152" y="184" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.45)">Lead Gtr</text>

  <rect x="330" y="108" width="65" height="36" rx="3" fill="#2e2e2e" stroke="#c8623a" stroke-width="1.5"/>
  <text x="362" y="123" text-anchor="middle" font-size="9" fill="#c8623a" font-weight="bold">AMP</text>
  <text x="362" y="137" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.45)">Keys</text>

  <rect x="625" y="108" width="65" height="36" rx="3" fill="#2e2e2e" stroke="#c8623a" stroke-width="1.5"/>
  <text x="657" y="123" text-anchor="middle" font-size="9" fill="#c8623a" font-weight="bold">AMP</text>
  <text x="657" y="137" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.45)">Bass</text>

  <rect x="835" y="155" width="65" height="36" rx="3" fill="#2e2e2e" stroke="#c8623a" stroke-width="1.5"/>
  <text x="867" y="170" text-anchor="middle" font-size="9" fill="#c8623a" font-weight="bold">AMP</text>
  <text x="867" y="184" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.45)">Elec Gtr</text>

  <!-- ══════════════════════════════════════════
       DRUM KIT
       Viewed from audience:
       - Throne: center back
       - Kick: center front
       - Rack tom: center, on kick
       - Snare: right-center (drummer's left)
       - Floor tom: right side (drummer's left)
       - Hi-hat: left side (drummer's right)
       - Ride: left-center (drummer's right)
       - Crash: right side (drummer's left, near floor tom)
  ══════════════════════════════════════════ -->

  <!-- Throne — center back -->
  <circle cx="510" cy="172" r="22" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="2"/>
  <text x="510" y="176" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">DRUMS</text>

  <!-- Kick drum — center, facing audience -->
  <ellipse cx="510" cy="272" rx="42" ry="32" fill="#2e2e2e" stroke="#e8dfc0" stroke-width="2"/>
  <text x="510" y="268" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">KICK</text>
  <text x="510" y="282" text-anchor="middle" font-size="9" fill="rgba(232,223,192,0.6)">DRUM</text>

  <!-- Rack tom — center, mounted above kick -->
  <ellipse cx="510" cy="228" rx="17" ry="13" fill="#2a2a2a" stroke="#e8dfc0" stroke-width="1.5"/>
  <text x="510" y="232" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">TOM</text>

  <!-- Snare — right-center (drummer's left front) -->
  <ellipse cx="465" cy="258" rx="16" ry="12" fill="#2a2a2a" stroke="#e8dfc0" stroke-width="1.5"/>
  <text x="465" y="262" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">SN</text>

  <!-- Floor tom — right side (drummer's left) -->
  <ellipse cx="444" cy="225" rx="20" ry="16" fill="#2a2a2a" stroke="#e8dfc0" stroke-width="1.5"/>
  <text x="444" y="229" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">FT</text>

  <!-- Crash cymbal — right side over floor tom (drummer's left) -->
  <ellipse cx="430" cy="192" rx="24" ry="7" fill="none" stroke="#e8dfc0" stroke-width="1.5" transform="rotate(-10,430,192)"/>
  <text x="412" y="188" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">CRASH</text>

  <!-- Hi-hat — left side (drummer's right) -->
  <ellipse cx="576" cy="228" rx="20" ry="7" fill="none" stroke="#e8dfc0" stroke-width="1.5"/>
  <text x="590" y="218" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">HH</text>

  <!-- Ride — left-center (drummer's right, center-right from their perspective) -->
  <ellipse cx="554" cy="195" rx="22" ry="7" fill="none" stroke="#e8dfc0" stroke-width="1.5" transform="rotate(10,554,195)"/>
  <text x="572" y="186" text-anchor="middle" font-size="8" fill="rgba(232,223,192,0.6)">RIDE</text>

  <!-- Drums label -->

  <!-- ══ POS 1 — Lead Guitar / Vocals (Stage Right = left of diagram) ══ -->
  <circle cx="152" cy="415" r="32" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="2"/>
  <text x="152" y="411" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">LEAD</text>
  <text x="152" y="425" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">GUITAR</text>
  <line x1="152" y1="447" x2="152" y2="475" stroke="rgba(232,223,192,0.5)" stroke-width="1.5"/>
  <circle cx="152" cy="478" r="5" fill="none" stroke="#c8623a" stroke-width="2"/>

  <!-- ══ POS 2 — Keys / Vocals (center left) ══ -->
  <circle cx="362" cy="415" r="32" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="2"/>
  <text x="362" y="419" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">KEYS</text>
  <line x1="362" y1="447" x2="362" y2="475" stroke="rgba(232,223,192,0.5)" stroke-width="1.5"/>
  <circle cx="362" cy="478" r="5" fill="none" stroke="#c8623a" stroke-width="2"/>

  <!-- ══ POS 4 — Bass / Vocals (center right) ══ -->
  <circle cx="657" cy="415" r="32" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="2"/>
  <text x="657" y="419" text-anchor="middle" font-size="10" fill="#e8dfc0" font-weight="bold">BASS</text>
  <line x1="657" y1="447" x2="657" y2="475" stroke="rgba(232,223,192,0.5)" stroke-width="1.5"/>
  <circle cx="657" cy="478" r="5" fill="none" stroke="#c8623a" stroke-width="2"/>
  <rect x="695" y="405" width="36" height="20" rx="2" fill="#1a1a1a" stroke="#4fb3a8" stroke-width="1.5"/>
  <text x="713" y="419" text-anchor="middle" font-size="8" fill="#4fb3a8">DI (opt)</text>

  <!-- ══ POS 5 — Gtr / Aux Keys / Trombone / Vocals (Stage Left = right of diagram) ══ -->
  <circle cx="867" cy="415" r="32" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="2"/>
  <text x="867" y="407" text-anchor="middle" font-size="9" fill="#e8dfc0" font-weight="bold">GTR /</text>
  <text x="867" y="420" text-anchor="middle" font-size="9" fill="#e8dfc0" font-weight="bold">AUX KEYS</text>
  <text x="867" y="433" text-anchor="middle" font-size="9" fill="#e8dfc0">/ TROMBONE</text>
  <line x1="867" y1="447" x2="867" y2="475" stroke="rgba(232,223,192,0.5)" stroke-width="1.5"/>
  <circle cx="867" cy="478" r="5" fill="none" stroke="#c8623a" stroke-width="2"/>
  <rect x="770" y="398" width="72" height="30" rx="2" fill="#1a1a1a" stroke="#4fb3a8" stroke-width="1.5"/>
  <text x="806" y="410" text-anchor="middle" font-size="7" fill="#4fb3a8">DI — Aux Keys</text>
  <text x="806" y="422" text-anchor="middle" font-size="7" fill="#4fb3a8">DI — Acoustic Gtr</text>

  <!-- ── FLOOR MONITORS ── -->
  <polygon points="228,515 288,515 276,543 240,543" fill="#2a2a2a" stroke="#c8623a" stroke-width="1.5"/>
  <text x="258" y="533" text-anchor="middle" font-size="8" fill="#c8623a">MON</text>

  <polygon points="732,515 792,515 780,543 744,543" fill="#2a2a2a" stroke="#c8623a" stroke-width="1.5"/>
  <text x="762" y="533" text-anchor="middle" font-size="8" fill="#c8623a">MON</text>

  <!-- ── Legend ── -->
  <rect x="100" y="575" width="820" height="22" rx="3" fill="#1a1a1a"/>
  <circle cx="122" cy="586" r="6" fill="#2e2e2e" stroke="#4fb3a8" stroke-width="1.5"/>
  <text x="134" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Musician</text>
  <circle cx="215" cy="586" r="5" fill="none" stroke="#c8623a" stroke-width="1.5"/>
  <text x="227" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Vocal mic</text>
  <rect x="305" y="580" width="18" height="12" rx="2" fill="#2e2e2e" stroke="#c8623a" stroke-width="1.5"/>
  <text x="329" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Amp</text>
  <rect x="380" y="580" width="28" height="12" rx="2" fill="#1a1a1a" stroke="#4fb3a8" stroke-width="1.5"/>
  <text x="394" y="590" text-anchor="middle" font-size="8" fill="#4fb3a8">DI</text>
  <text x="415" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Direct In</text>
  <ellipse cx="487" cy="586" rx="16" ry="5" fill="none" stroke="#e8dfc0" stroke-width="1.5"/>
  <text x="510" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Cymbal</text>
  <polygon points="565,592 595,592 589,580 571,580" fill="#2a2a2a" stroke="#c8623a" stroke-width="1.5"/>
  <text x="603" y="590" font-size="10" fill="rgba(232,223,192,0.6)">Floor monitor</text>
  <text x="710" y="590" font-size="10" fill="rgba(232,223,192,0.3)">kingsofewing.com · KingsOfEwing@gmail.com</text>

</svg>
